name: Render X Posts

on:
  workflow_dispatch:  # Manual render trigger; X ingestion now lives in x-content-os.

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Render X posts page
        run: python3 scripts/update_xposts.py --render-only

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xposts-data.json xposts.html
          if ! git diff --staged --quiet; then
            git commit -m "chore: render X posts $(date +%Y-%m-%d)"
            git push
          fi
